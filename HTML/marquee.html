<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>marquee tag</title>

         <style>

                marquee{
                    border: 3px solid;
                }

         </style>
       
    </head>
    <body>
        
        
        <marquee behavior="" direction="">
            
            <h1>Breaking News :  RCB has reached to the Finale 🥳🥳</h1>
        </marquee>

    

        <marquee behavior="" direction="" scrollamount="30">

            <img src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUydnA1djdjaWFsczZsc3lkMmtvd3k5Z3d4c3h6NG93enZoeGt2Z292diZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/NqYpeCjGW4KEGE7Qir/giphy.gif" alt="" height="350">

            <img src="https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyd2c5MjI3dGN0NzczM3ZjZHNtZnZxd3JhZm50cjA1aGlyeWYydWtxcyZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/fstV57yumJ3dMUaYPr/200.gif" alt="">
        </marquee>


        <marquee behavior="" direction="right" scrollamount="20">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyaWF0dWttZ3gxbGVuZzcxano5cTI0ZXZ3eGQwZmw4ZHpzcmpycWFxNiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3ornjQQZhry6bF31CM/source.gif" alt="" height="150">
        </marquee>

        <marquee behavior="alternate" direction="right" scrollamount="20" loop="6" width="700">

            <h2>good afternoon everyone</h2>
        </marquee>


        <marquee behavior="" direction="down" height="400" >

             <img src="https://i.pinimg.com/originals/9c/e0/4c/9ce04c7ddeef0b9abae7f085255cdef1.gif" alt="" height="140">
        </marquee>



         <marquee behavior="" direction="">

            <b>hi</b>
            <u>bye</u>
         </marquee>
        
    </body>
    </html>
