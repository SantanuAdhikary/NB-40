<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic tag example</title>

    <style>
         *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
         }

         nav{
            height: 80px;
            background-color: black;
            color:white;
            display: flex;
            justify-content: space-around;
            align-items: center;
         }

         nav > ul {
            display: flex;
            gap:25px;
            list-style: none;
         }

         nav > ul > li{
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
         }

         main{
            height: 250px;
            background-color: brown;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap:20px;
         }

         main > h1{
            letter-spacing: 3px;
            font-size: 45px;
            text-transform: capitalize;
            color:white;

         }

         main > p{
            color:white;
            font-size: 21px;
            font-style: italic;
         }

         main > button{
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background-color: black;
            color:white;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
         }

         section{
            height: 300px;
            background-color: lightslategrey;
            display: flex;
            justify-content: center;
            align-items: center;
         }

         section  figure{
            width: 300px;
            background-color: white;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.6);
         }

         img{
            border-radius: 15px;
         }

         figcaption{
            font-weight: bold;
            letter-spacing: 1.3px;
            font-size: 18px;
         }

         article{
            height: 250px;
            display: flex;
         }

         article > aside{
            flex-basis: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
         }

         article > aside:nth-child(1)
         {
            background:linear-gradient(to right,red,yellow);
         }
         article > aside:nth-child(2)
         {
            background:linear-gradient(to right,skyblue,white);
         }

         footer{
            height: 100px;
            background-color: lightslategray;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
         }
    </style>
</head>
<body>
    
    <nav>
        <h1>myLogo</h1>
        <ul>
            <li>home</li>
            <li>about</li>
            <li>contact</li>
        </ul>

    </nav>

    <main>
         <h1>welcome to semantic tag session</h1>
         <p>here we will get to know how to use semantic tags in html and what is the meaning of these tags.</p>
         <button>get started</button>
    </main>

    <section>
         <figure>
              <img src="https://images.pexels.com/photos/694636/pexels-photo-694636.jpeg" alt="" height="150">

              <figcaption>mountain image</figcaption>
         </figure>
    </section>

    <article>
        <aside>
             <h2>I am left side</h2>
        </aside>

        <aside>
            <h2>I am right side</h2>
        </aside>
    </article>

    <footer>
         
        <details>
              <summary>NB40 Batch</summary>
              <p> this is the best webtech batch I have taken in qspider </p>
        </details>
    </footer>
</body>
</html>
