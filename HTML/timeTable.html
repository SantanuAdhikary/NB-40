<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timetable</title>
</head>
<body>
    
    <table border="1" width="1000" height="400">

        <caption> college time table </caption>

        <tr>
             <th>Day/Period</th>
             <th>9:30-10:30</th>
             <th>10:30-11:30</th>
             <th>11:30-12:20</th>
             <th>12:30-1:30</th>
             <th>1:30-2:30</th>
             <th>2:30-3:20</th>
             <th>3:30-4:30</th>
             <th>4:30-5:30</th>

        </tr>

        <tr>
             <th>Monday</th>
             <td>eng</td>
             <td>math</td>
             <td>che</td>
             <td rowspan="5">lunch</td>
             <td colspan="3">lab</td>
             <td>phy</td>
        </tr>

        <tr>
            <th>tuesday</th>
            <td colspan="3">lab</td>
            <td>eng</td>
            <td>che</td>
            <td>math</td>
            <td>sports</td>
        </tr>

        <tr>
             <th>wednesday</th>
             <td>math</td>
             <td>phy</td>
             <td>eng</td>
             <td>che</td>
             <td colspan="3">library</td>

        </tr>

        <tr>
            <th>thursday</th>
            <td>phy</td>
            <td>eng</td>
            <td>che</td>
            <td colspan="3">lab</td>
            <td>math</td>
        </tr>
        <tr>
            <th>friday</th>
            <td>phy</td>
            <td>eng</td>
            <td>che</td>
            <td colspan="3">lab</td>
            <td>math</td>
        </tr>
         
    </table>
</body>
</html>
