<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div tag example</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        #nav{

            background-color: chocolate;
            display: flex;
            height:80px ;
            justify-content: space-around;
            align-items: center;
        }


        ul{
            display: flex;
            gap: 20px;
        }

        li{
            list-style:none ;
            font-size: 18px;
            text-transform: capitalize;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
        }

        #main{
            height: 250px;
            background-color: crimson;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap:10px;
            color:white;
        }


        #section{
            height: calc(100vh - 330px);
            background-color: limegreen;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .card{
            height: 200px;
            width: 300px;
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 4px 5px gray;
        }

       #main span{
            background-color: yellow;
            font-size: 30px;
            font-style: italic;
            color:red;
            text-decoration: underline;
            
        }

        #nav span{
            color:white;
            font-style: italic;
        }


    </style>

</head>
<body>
    
    <div id="nav">
          <h2> <span>My</span> Logo</h2>

          <ul>
            <li>Home</li>
            <li>about</li>
            <li>contact</li>
          </ul>
    </div>

    <div id="main">
         <h1>welcome to my application</h1>
         <p>here you will get <span>20% discount</span> </p>
         <button>shop now</button>
    </div>

    <div id="section">

        <div class="card">
            <h3>i am card1</h3>
        </div>

        <div class="card">
            <h3>i am card2</h3>
        </div>

        <div class="card">
            <h3>i am card3</h3>
        </div>

    </div>

</body>
</html>
