<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table2 in html</title>
</head>
<body>
    
    <h2>table 2 in html</h2>

    <table border="1" width="700" height="400">

         <tr>
             <td>1</td>
             <td>2</td>
             <td>3</td>
             
         </tr>

         <tr>
             <td colspan="2">4</td>
             <td>5</td>
         </tr>

         <tr>
            <td rowspan="2">6</td>
            <td>7</td>
            <td rowspan="3">8</td>
         </tr>

         <tr>
            <td>9</td>
         </tr>

         <tr>
            <td colspan="2">10</td>
         </tr>
    </table>
</body>
</html>
