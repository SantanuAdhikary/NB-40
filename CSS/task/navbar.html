<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar task1</title>

    <style>
         *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
         }

         nav{
             background-color: black;
             color:white;
             height: 100px;

             display: flex;
             justify-content: space-around;
             align-items: center;
            }

            nav > ul{
                display: flex;
                gap:20px;
            }

            nav > ul > li{
                text-transform: uppercase;
                font-size: 19px;
                font-weight: bold;
                letter-spacing: 1.4px;
                list-style: none;
                cursor: pointer;
            }

            nav > ul > li:hover{
                color:orangered;
            }
    </style>
</head>
<body>

    <nav>
         <h2>myLogo</h2>

         <ul>
             <li>home</li>
             <li>about</li>
             <li>contact</li>
         </ul>
    </nav>
    
</body>
</html>
