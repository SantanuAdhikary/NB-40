<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marvel heroes</title>

    <style>
         *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
         }


         section{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-attachment: fixed;
         }

         #s1{
            background-image: url("./ironman.jpg");
            background-size: cover;
            background-position: top;
         }
         #s2{
            background-image: url("./captain.jpg");
            background-size: cover;
            background-position: top;
         }
         #s3{
            background-image: url("./thor.jpg");
            background-size: cover;
            background-position: top;
         }
         #s4{
            background-image: url("https://cdn.marvel.com/content/2x/006hbb_ons_mas_mob_01_0.webp");
            background-size: cover;
            background-position: top;
         }
         #s5{
            background-image: url("https://cdn.europosters.eu/image/1300/image/750/wall-murals/spiderman-marvel-i41725.jpg");
            background-size: cover;
            background-position: top;
         }

         section > h1{
            font-size: 80px;
            color:white;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 1px 4px 5px red;
         }

    </style>
</head>
<body>
    <section id="s1">

         <h1>ironman</h1>
    </section>

    <section id="s2">

         <h1>captain america</h1>
    </section>

    <section id="s3">

         <h1>thor</h1>
    </section>

    <section id="s4">

         <h1>hulk</h1>
    </section>

    <section id="s5">

         <h1>spiderman</h1>
    </section>
</body>
</html>
